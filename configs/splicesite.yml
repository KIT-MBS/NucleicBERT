logging_config:
  project: splicesite
  name: run1
  save_dir: ../logs_test/
model_config:
  dropout: 0.1
  hidden_size: 1024
  max_length: 1024
  num_attention_heads: 32
  num_hidden_layers: 32
  position_embedding: learned
  vocab_size: 25
run_config:
  batch_size: 4
  ckpt_dir: ../logs_test/lightning_logs/
  data_split_ratio: 0.8
  frozen: false
  internal_logs_freq: 1
  logger_type: wandb
  lr: 1.0e-06
  max_epochs: 30
  num_workers: 24
  pretrained_path: weights/pretrained.pt
  tokenizer_file: nucleicbert/tokenizers/noncoding_seqs.json
  use_scheduler: true
  weight_decay: 0
  task: acceptor
test_data_config:
  input_dir: ../data/splice_data/Benchmarks/
  max_length: 400
  min_length: 0
  species: Worm
train_data_config:
  input_dir: ../data/splice_data/GS_1/db_1/
  max_length: 400
  min_length: 0
val_data_config:
  input_dir: ../data/splice_data/GS_1/db_1/
  max_length: 400
  min_length: 0
trainer_config:
  accelerator: gpu
  devices: 1
  log_every_n_steps: 1000
  num_nodes: 1
  strategy: ddp_find_unused_parameters_true
