logging_config:
  project: pretraining
  name: run1
  save_dir: ../logs_test/
model_config:
  dropout: 0.1
  hidden_size: 1024
  max_length: 1024
  num_attention_heads: 32
  num_hidden_layers: 32
  vocab_size: 25
  position_embedding: 'learned'
run_config:
  batch_size: 16
  lr: 1.0e-05
  num_workers: 32
  max_epochs: 8
  use_scheduler: False
  constant_mask_positions: null
  mask_lm_prob: 0.15
  weight_decay: 0
  internal_metrics_log_freq: 2
  data_split_ratio: 0.8
  tokenizer_file: nucleicbert/tokenizers/noncoding_seqs.json
  logger_type: wandb
  ckpt_dir: ../logs_test/lightning_logs/
train_data_config:
  input_dir: ../mars_data/processed_data_python/noncoding_seqs/
trainer_config:
  accelerator: gpu
  devices: 1
  num_nodes: 1
  strategy: ddp_find_unused_parameters_false
  gradient_clip_val: 0.001
  gradient_clip_algorithm: 'value'
  precision: '16-mixed'
  log_every_n_steps: 50
  accumulate_grad_batches: 4